# Colony Rust App — Release Workflow
#
# Driven by release-please: a PR is opened when commits land on main, and
# merging that PR tags the version + uploads the 4 platform binaries to the
# GitHub release. Colony picks them up automatically via the naming convention
# grape-{linux,windows.exe,macos,macos-x86}.

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: rust

  build:
    name: Build ${{ matrix.asset }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: "grape-linux"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: "grape-windows.exe"
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: "grape-macos"
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: "grape-macos-x86"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Grape runtime needs GTK3 (tray-icon), xdo (global-hotkey), dbus
      # (notify-rust) and ALSA (rodio) on Linux builds. wgpu + iced pull the
      # rest via mesa + libglib-dev at runtime.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxdo-dev \
            libdbus-1-dev \
            libasound2-dev \
            libglib2.0-dev \
            pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/grape ${{ matrix.asset }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\grape.exe ${{ matrix.asset }}

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ matrix.asset }}
